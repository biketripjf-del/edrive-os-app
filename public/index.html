<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eDrive - Gerador de Ordem de Serviço</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0099CC;
            --primary-dark: #003A70;
            --primary-light: #00B4D8;
            --secondary: #F5F5F5;
            --text: #333;
            --border: #DDD;
            --success: #4CAF50;
            --danger: #f44336;
            --warning: #FF9800;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        /* HEADER */
        header {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 300px;
            height: 300px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        .header-content {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .logo {
            width: 60px;
            height: 60px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: var(--primary);
            font-size: 24px;
        }

        .header-text h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .header-text p {
            font-size: 14px;
            opacity: 0.9;
        }

        /* MAIN CONTENT */
        .content {
            padding: 40px;
        }

        /* FORM SECTIONS */
        .section {
            margin-bottom: 35px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--primary-light);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--primary-dark);
            font-size: 14px;
        }

        input[type="text"],
        input[type="date"],
        input[type="number"],
        input[type="email"],
        select,
        textarea {
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="date"]:focus,
        input[type="number"]:focus,
        input[type="email"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 153, 204, 0.1);
        }

        select {
            cursor: pointer;
        }

        /* ITENS TABLE */
        .items-section {
            margin-top: 40px;
        }

        .items-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .items-table thead {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
        }

        .items-table th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .items-table td {
            padding: 15px;
            border-top: 1px solid var(--border);
        }

        .items-table tbody tr:hover {
            background: var(--secondary);
        }

        .items-table input {
            width: 100%;
        }

        .btn-remove {
            background: var(--danger);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.3s;
        }

        .btn-remove:hover {
            background: #d32f2f;
        }

        /* BUTTONS */
        .buttons {
            display: flex;
            gap: 15px;
            margin-top: 40px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 14px 30px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(0, 153, 204, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 153, 204, 0.4);
        }

        .btn-secondary {
            background: var(--secondary);
            color: var(--primary);
            border: 2px solid var(--primary);
        }

        .btn-secondary:hover {
            background: var(--primary);
            color: white;
        }

        .btn-add-item {
            background: var(--success);
            color: white;
            margin-bottom: 20px;
        }

        .btn-add-item:hover {
            background: #45a049;
        }

        /* RESUMO */
        .resume {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
        }

        .resume-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }

        .resume-row:last-child {
            border-bottom: none;
        }

        .resume-total {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary-dark);
            margin-top: 10px;
        }

        /* LOADING */
        .loading {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }

        .loading.active {
            display: flex;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.3);
            border-top: 5px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* RESPONSIVO */
        @media (max-width: 768px) {
            .content {
                padding: 20px;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .items-table {
                font-size: 12px;
            }

            .items-table th, .items-table td {
                padding: 10px;
            }

            .buttons {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <div class="logo">▲</div>
                <div class="header-text">
                    <h1>eDrive</h1>
                    <p>Gerador de Ordem de Serviço</p>
                </div>
            </div>
        </header>

        <div class="content">
            <form id="osForm">
                <!-- INFORMAÇÕES GERAIS -->
                <div class="section">
                    <h2 class="section-title">📋 Informações Gerais</h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="fornecedor">Fornecedor *</label>
                            <select id="fornecedor" required>
                                <option value="">Selecione um fornecedor...</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="cnpj">CNPJ/CPF</label>
                            <input type="text" id="cnpj" readonly style="background: #f5f5f5;">
                        </div>
                        <div class="form-group">
                            <label for="dataAbertura">Data de Abertura *</label>
                            <input type="date" id="dataAbertura" required>
                        </div>
                    </div>
                </div>

                <!-- DATAS -->
                <div class="section">
                    <h2 class="section-title">📅 Cronograma</h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="dataPrevista">Data Prevista *</label>
                            <input type="date" id="dataPrevista" required>
                        </div>
                        <div class="form-group">
                            <label for="dataFinalizacao">Data de Finalização</label>
                            <input type="date" id="dataFinalizacao">
                        </div>
                    </div>
                </div>

                <!-- CONTATO -->
                <div class="section">
                    <h2 class="section-title">👤 Contato</h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="responsavel">Responsável</label>
                            <input type="text" id="responsavel" placeholder="Nome do responsável">
                        </div>
                        <div class="form-group">
                            <label for="telefone">Telefone</label>
                            <input type="text" id="telefone" placeholder="(00) 00000-0000">
                        </div>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" placeholder="email@example.com">
                        </div>
                    </div>
                </div>

                <!-- ITENS -->
                <div class="section items-section">
                    <h2 class="section-title">📦 Itens/Serviços</h2>
                    <button type="button" class="btn-add-item" onclick="adicionarItem()">+ Adicionar Item</button>
                    
                    <table class="items-table">
                        <thead>
                            <tr>
                                <th>Produto/Serviço</th>
                                <th style="width: 80px;">QTD</th>
                                <th style="width: 100px;">Valor Unit.</th>
                                <th style="width: 100px;">Valor Total</th>
                                <th style="width: 100px;">Garantia</th>
                                <th style="width: 60px;">Ação</th>
                            </tr>
                        </thead>
                        <tbody id="itemsBody">
                            <!-- Itens adicionados aqui -->
                        </tbody>
                    </table>

                    <div class="resume">
                        <div class="resume-row">
                            <span>Quantidade Total:</span>
                            <strong id="totalQtd">0</strong>
                        </div>
                        <div class="resume-row">
                            <span>Subtotal:</span>
                            <strong id="subtotal">R$ 0,00</strong>
                        </div>
                        <div class="resume-row" style="background: rgba(0, 153, 204, 0.1); padding: 12px; border-radius: 4px; border: none; margin-top: 10px;">
                            <span style="font-size: 16px; font-weight: 700;">Valor Total:</span>
                            <strong id="total" style="font-size: 18px; color: #0099CC;">R$ 0,00</strong>
                        </div>
                    </div>
                </div>

                <!-- OBSERVAÇÕES -->
                <div class="section">
                    <h2 class="section-title">📝 Observações</h2>
                    <div class="form-group">
                        <label for="observacoes">Notas adicionais</label>
                        <textarea id="observacoes" rows="4" placeholder="Digite aqui qualquer observação..."></textarea>
                    </div>
                </div>

                <!-- BOTÕES -->
                <div class="buttons">
                    <button type="button" class="btn-secondary" onclick="limparForm()">Limpar Formulário</button>
                    <button type="button" class="btn-primary" onclick="gerarPDF()">📄 Gerar PDF</button>
                    <button type="button" class="btn-primary" onclick="enviarParaAutos360()">📤 Enviar para Autos 360</button>
                </div>
            </form>
        </div>
    </div>

    <div class="loading" id="loading">
        <div class="spinner"></div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
